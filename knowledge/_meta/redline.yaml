# 医美内容合规红线词库 v1.0
# 用于自动扫描文档，发现违规表述

# 一、绝对禁止词（命中即拒绝入库）
forbidden:
  - 根治
  - 永久
  - 永久性
  - 终身
  - 最佳
  - 最好
  - 第一
  - 唯一
  - 奇迹
  - 神奇
  - 保证
  - 100%
  - 百分百
  - 零风险
  - 无风险
  - 无副作用
  - 绝对安全
  - 一劳永逸
  - 立竿见影
  - 速效
  - 包治
  - 治愈率

# 二、限制使用词（命中需人工审核 + 临床数据支撑）
restricted:
  - 明显改善
  - 显著效果
  - 显著提升
  - 大幅改善
  - 国家级
  - 权威专家
  - 顶级专家
  - 进口原装
  - 全网最低
  - 特价
  - 限时

# 三、必须出现的合规声明（缺失即降分）
required_disclaimer:
  - 因人而异
  - 个体差异
  - 咨询专业医生
  - 仅供参考

# 四、价格表述规范
price_rules:
  must_contain_if_price_mentioned:
    - 参考价
    - 区间
  must_note:
    - 不含麻醉
    - 不含护理
